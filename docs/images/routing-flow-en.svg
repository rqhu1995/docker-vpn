<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Start the service first, then route traffic</title>
  <desc id="desc">Docker-VPN first establishes the HKU tunnel and exposes local ports 1080 and 1088. Applications can then reference those ready ports directly or through Surge or Clash rules. At runtime, HKU traffic enters Docker-VPN while separate routing policies can send AI traffic directly or through an existing proxy.</desc>
  <defs>
    <clipPath id="rounded-icon" clipPathUnits="objectBoundingBox">
      <rect width="1" height="1" rx="0.18"/>
    </clipPath>
    <style>
      .title { font: 700 28px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #0f172a; }
      .subtitle { font: 400 16px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #475569; }
      .section { font: 700 12px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #475569; }
      .heading { font: 700 18px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #0f172a; }
      .body { font: 500 14px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #334155; }
      .small { font: 500 12px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #64748b; }
      .mono { font: 600 12px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #0f172a; }
      .arrow { fill: none; stroke: #334155; stroke-width: 2.25; stroke-linecap: round; stroke-linejoin: round; }
      .setup-arrow { fill: none; stroke: #64748b; stroke-width: 2.25; stroke-linecap: round; stroke-dasharray: 7 6; }
      .arrow-tip { fill: #334155; }
    </style>
  </defs>

  <rect x="1" y="1" width="1198" height="758" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="40" y="48" class="title">Start the service first, then route traffic</text>
  <text x="40" y="76" class="subtitle">Docker-VPN creates the HKU upstream before any application or rules client can use it</text>

  <rect x="40" y="101" width="88" height="24" rx="12" fill="#e2e8f0"/>
  <text x="84" y="117" text-anchor="middle" class="section">SETUP</text>
  <line x1="140" y1="113" x2="1160" y2="113" stroke="#e2e8f0" stroke-width="2"/>

  <rect x="40" y="133" width="420" height="194" rx="9" fill="#ecfdf5" stroke="#047857" stroke-width="3"/>
  <rect x="61" y="150" width="154" height="24" rx="12" fill="#047857"/>
  <text x="138" y="166" text-anchor="middle" style="font: 700 11px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #ffffff;">1 · START DOCKER-VPN</text>
  <image href="docker-vpn-icon.png" x="62" y="200" width="64" height="64" clip-path="url(#rounded-icon)"/>
  <text x="145" y="203" class="heading" style="font-size: 20px;">Docker-VPN / OpenConnect</text>
  <text x="145" y="226" class="small">Tunnel and local listeners become ready</text>
  <rect x="145" y="240" width="287" height="30" rx="6" fill="#ffffff" stroke="#a7f3d0"/>
  <text x="161" y="260" class="mono">SOCKS5  127.0.0.1:1080</text>
  <rect x="145" y="277" width="287" height="30" rx="6" fill="#ffffff" stroke="#a7f3d0"/>
  <text x="161" y="297" class="mono">HTTP    127.0.0.1:1088</text>

  <path d="M460 230 H508" class="setup-arrow"/>
  <path d="M508 226 L516 230 L508 234 Z" class="arrow-tip"/>
  <rect x="470" y="197" width="48" height="22" rx="11" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="494" y="212" text-anchor="middle" class="small">ready</text>

  <rect x="520" y="133" width="640" height="194" rx="9" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <rect x="541" y="150" width="225" height="24" rx="12" fill="#2563eb"/>
  <text x="653" y="166" text-anchor="middle" style="font: 700 11px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #ffffff;">2 · REFERENCE THE READY PORTS</text>
  <rect x="541" y="191" width="280" height="111" rx="7" fill="#ffffff"/>
  <circle cx="569" cy="219" r="15" fill="#475569"/>
  <text x="569" y="224" text-anchor="middle" style="font: 700 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #ffffff;">A</text>
  <text x="594" y="225" class="heading">Direct app settings</text>
  <text x="561" y="258" class="body">Enter either local proxy in the app</text>
  <text x="561" y="281" class="small">No Surge or Clash required</text>
  <rect x="840" y="191" width="299" height="111" rx="7" fill="#ffffff"/>
  <circle cx="868" cy="219" r="15" fill="#2563eb"/>
  <text x="868" y="224" text-anchor="middle" style="font: 700 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #ffffff;">B</text>
  <text x="893" y="225" class="heading">Rules-client settings</text>
  <image href="brands/surge.png" x="862" y="247" width="40" height="40" clip-path="url(#rounded-icon)"/>
  <image href="brands/clash-verge-rev.png" x="912" y="247" width="40" height="40" clip-path="url(#rounded-icon)"/>
  <text x="965" y="263" class="body">Add the HKU upstream</text>
  <text x="965" y="284" class="small">Surge · Clash · other clients</text>

  <rect x="40" y="355" width="150" height="24" rx="12" fill="#e2e8f0"/>
  <text x="115" y="371" text-anchor="middle" class="section">RUNTIME TRAFFIC</text>
  <line x1="202" y1="367" x2="1160" y2="367" stroke="#e2e8f0" stroke-width="2"/>

  <rect x="40" y="421" width="170" height="206" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="125" y="453" text-anchor="middle" class="heading">App requests</text>
  <circle cx="76" cy="502" r="20" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5"/>
  <circle cx="76" cy="502" r="10" fill="none" stroke="#0284c7" stroke-width="2"/>
  <path d="M66 502 H86 M76 492 C71 497 71 507 76 512 M76 492 C81 497 81 507 76 512" fill="none" stroke="#0284c7" stroke-width="1.5"/>
  <rect x="105" y="482" width="40" height="40" rx="8" fill="#111827"/>
  <text x="125" y="508" text-anchor="middle" style="font: 700 14px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #ffffff;">&gt;_</text>
  <image href="brands/windows-app.png" x="160" y="482" width="40" height="40" clip-path="url(#rounded-icon)"/>
  <text x="125" y="558" text-anchor="middle" class="body">Use the settings above</text>
  <text x="125" y="581" text-anchor="middle" class="small">for each destination</text>

  <rect x="250" y="405" width="235" height="92" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
  <circle cx="277" cy="435" r="15" fill="#475569"/>
  <text x="277" y="440" text-anchor="middle" style="font: 700 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #ffffff;">A</text>
  <text x="302" y="441" class="heading">Configured app</text>
  <text x="273" y="473" class="small">HKU request uses its proxy setting</text>

  <rect x="250" y="528" width="235" height="116" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <circle cx="277" cy="558" r="15" fill="#2563eb"/>
  <text x="277" y="563" text-anchor="middle" style="font: 700 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #ffffff;">B</text>
  <text x="302" y="564" class="heading">Rules client</text>
  <image href="brands/surge.png" x="273" y="580" width="40" height="40" clip-path="url(#rounded-icon)"/>
  <image href="brands/clash-verge-rev.png" x="323" y="580" width="40" height="40" clip-path="url(#rounded-icon)"/>
  <text x="380" y="593" class="body">Apply rules</text>
  <text x="380" y="616" class="small">Choose upstream</text>

  <rect x="540" y="405" width="280" height="174" rx="9" fill="#ecfdf5" stroke="#047857" stroke-width="3"/>
  <image href="docker-vpn-icon.png" x="560" y="424" width="64" height="64" clip-path="url(#rounded-icon)"/>
  <text x="640" y="445" class="heading">Local HKU upstream</text>
  <text x="640" y="470" class="small">Same service started in step 1</text>
  <rect x="560" y="505" width="240" height="38" rx="6" fill="#ffffff" stroke="#a7f3d0"/>
  <text x="580" y="529" class="mono">:1080  or  :1088</text>
  <text x="680" y="562" text-anchor="middle" class="small">Traffic enters OpenConnect here</text>

  <rect x="950" y="405" width="210" height="174" rx="8" fill="#fff1f2" stroke="#e11d48" stroke-width="2"/>
  <image href="brands/hku-shield.png" x="1023" y="422" width="64" height="64" clip-path="url(#rounded-icon)"/>
  <text x="1055" y="522" text-anchor="middle" class="heading">HKU resources</text>
  <text x="1055" y="547" text-anchor="middle" class="small">Library · SSH · desktop</text>

  <rect x="540" y="615" width="280" height="86" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="680" y="645" text-anchor="middle" class="heading">Other client policies</text>
  <text x="680" y="676" text-anchor="middle" class="body">DIRECT / existing proxy</text>

  <rect x="850" y="615" width="310" height="86" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/>
  <image href="brands/claude.jpg" x="870" y="630" width="40" height="40" clip-path="url(#rounded-icon)"/>
  <image href="brands/chatgpt.png" x="940" y="630" width="40" height="40" clip-path="url(#rounded-icon)"/>
  <image href="brands/codex.png" x="1010" y="630" width="40" height="40" clip-path="url(#rounded-icon)"/>
  <text x="890" y="691" text-anchor="middle" class="small">Claude</text>
  <text x="960" y="691" text-anchor="middle" class="small">ChatGPT</text>
  <text x="1030" y="691" text-anchor="middle" class="small">Codex</text>
  <text x="1110" y="657" text-anchor="middle" class="body">AI</text>
  <text x="1110" y="678" text-anchor="middle" class="small">examples</text>

  <path d="M210 477 C228 477 228 451 238 451" class="arrow"/>
  <path d="M238 447 L246 451 L238 455 Z" class="arrow-tip"/>
  <path d="M210 554 C228 554 228 586 238 586" class="arrow"/>
  <path d="M238 582 L246 586 L238 590 Z" class="arrow-tip"/>
  <path d="M485 451 H528" class="arrow"/>
  <path d="M528 447 L536 451 L528 455 Z" class="arrow-tip"/>
  <path d="M485 568 C510 568 510 530 528 530" class="arrow"/>
  <path d="M528 526 L536 530 L528 534 Z" class="arrow-tip"/>
  <path d="M820 492 H938" class="arrow"/>
  <path d="M938 488 L946 492 L938 496 Z" class="arrow-tip"/>
  <rect x="827" y="460" width="116" height="22" rx="11" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="885" y="475" text-anchor="middle" class="small">HKU VPN traffic</text>
  <path d="M485 630 C510 630 510 658 528 658" class="arrow"/>
  <path d="M528 654 L536 658 L528 662 Z" class="arrow-tip"/>
  <path d="M820 658 H838" class="arrow"/>
  <path d="M838 654 L846 658 L838 662 Z" class="arrow-tip"/>

  <rect x="40" y="718" width="1120" height="24" rx="6" fill="#f1f5f9"/>
  <text x="600" y="735" text-anchor="middle" class="body">With these rules, HKU and AI traffic use independent upstreams and do not interfere with each other</text>
</svg>
