<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" role="img" aria-labelledby="title desc">
  <title id="title">Docker-VPN 提供的能力</title>
  <desc id="desc">应用可以直接使用本地 HKU 代理，也可以由可选的 Surge 或 Clash 规则选择。Docker-VPN 把 HKU OpenConnect 隧道暴露为本机 1080 和 1088 端口；其他分流策略不属于本项目。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <clipPath id="rounded-icon" clipPathUnits="objectBoundingBox">
      <rect width="1" height="1" rx="0.18"/>
    </clipPath>
    <style>
      .title { font: 700 28px -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Segoe UI', sans-serif; fill: #0f172a; }
      .subtitle { font: 400 16px -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Segoe UI', sans-serif; fill: #475569; }
      .heading { font: 700 18px -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Segoe UI', sans-serif; fill: #0f172a; }
      .body { font: 500 14px -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Segoe UI', sans-serif; fill: #334155; }
      .small { font: 500 12px -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Segoe UI', sans-serif; fill: #64748b; }
      .mono { font: 600 13px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #0f172a; }
      .arrow { fill: none; stroke: #334155; stroke-width: 2.5; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="1" y="1" width="1198" height="538" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="40" y="48" class="title">Docker-VPN 提供的能力</text>
  <text x="40" y="76" class="subtitle">把一条 HKU VPN 隧道暴露为两个本地代理端口</text>

  <rect x="40" y="140" width="205" height="250" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="142" y="177" text-anchor="middle" class="heading">应用与工具</text>
  <circle cx="74" cy="229" r="23" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5"/>
  <circle cx="74" cy="229" r="12" fill="none" stroke="#0284c7" stroke-width="2"/>
  <path d="M62 229 H86 M74 217 C68 223 68 235 74 241 M74 217 C80 223 80 235 74 241" fill="none" stroke="#0284c7" stroke-width="1.5"/>
  <rect x="119" y="206" width="46" height="46" rx="8" fill="#111827"/>
  <text x="142" y="235" text-anchor="middle" style="font: 700 15px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #ffffff;">&gt;_</text>
  <image href="brands/windows-app.png" x="181" y="206" width="46" height="46" clip-path="url(#rounded-icon)"/>
  <text x="74" y="279" text-anchor="middle" class="small">浏览器</text>
  <text x="142" y="279" text-anchor="middle" class="small">SSH</text>
  <text x="204" y="279" text-anchor="middle" class="small">远程桌面</text>
  <rect x="59" y="309" width="167" height="56" rx="6" fill="#ffffff"/>
  <text x="142" y="333" text-anchor="middle" class="body">需要 HKU 的流量</text>
  <text x="142" y="354" text-anchor="middle" class="small">由用户自行选择</text>

  <rect x="310" y="118" width="245" height="128" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
  <circle cx="338" cy="151" r="15" fill="#475569"/>
  <text x="338" y="156" text-anchor="middle" style="font: 700 13px -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Segoe UI', sans-serif; fill: #ffffff;">A</text>
  <text x="362" y="157" class="heading">应用直接设置</text>
  <text x="333" y="191" class="body">在应用内填写 SOCKS5 或 HTTP</text>
  <text x="333" y="216" class="small">不需要 Surge 或 Clash</text>

  <rect x="310" y="274" width="245" height="128" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <circle cx="338" cy="307" r="15" fill="#2563eb"/>
  <text x="338" y="312" text-anchor="middle" style="font: 700 13px -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Segoe UI', sans-serif; fill: #ffffff;">B</text>
  <text x="362" y="313" class="heading">可选的规则客户端</text>
  <image href="brands/surge.png" x="333" y="335" width="38" height="38" clip-path="url(#rounded-icon)"/>
  <image href="brands/clash-verge-rev.png" x="383" y="335" width="38" height="38" clip-path="url(#rounded-icon)"/>
  <text x="438" y="351" class="body">Surge · Clash</text>
  <text x="438" y="371" class="small">图中只展示 HKU 规则</text>

  <rect x="619" y="108" width="322" height="304" rx="12" fill="#d1fae5" opacity="0.7"/>
  <rect x="629" y="118" width="302" height="284" rx="8" fill="#ecfdf5" stroke="#047857" stroke-width="4"/>
  <rect x="653" y="138" width="120" height="24" rx="12" fill="#047857"/>
  <text x="713" y="154" text-anchor="middle" style="font: 700 11px -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Segoe UI', sans-serif; fill: #ffffff;">本项目</text>
  <image href="docker-vpn-icon.png" x="653" y="181" width="68" height="68" clip-path="url(#rounded-icon)"/>
  <text x="743" y="211" class="heading" style="font-size: 23px;">Docker-VPN</text>
  <text x="743" y="235" class="small">把 HKU VPN 作为本地代理</text>
  <rect x="653" y="270" width="254" height="42" rx="6" fill="#ffffff" stroke="#a7f3d0"/>
  <text x="670" y="296" class="mono">SOCKS5  127.0.0.1:1080</text>
  <rect x="653" y="323" width="254" height="42" rx="6" fill="#ffffff" stroke="#a7f3d0"/>
  <text x="670" y="349" class="mono">HTTP    127.0.0.1:1088</text>
  <text x="780" y="387" text-anchor="middle" class="small">OpenConnect 在容器内运行</text>

  <rect x="1000" y="153" width="160" height="218" rx="8" fill="#fff1f2" stroke="#e11d48" stroke-width="2"/>
  <image href="brands/hku-shield.png" x="1040" y="176" width="80" height="80" clip-path="url(#rounded-icon)"/>
  <text x="1080" y="291" text-anchor="middle" class="heading">HKU 资源</text>
  <text x="1080" y="320" text-anchor="middle" class="small">图书馆 · SSH</text>
  <text x="1080" y="341" text-anchor="middle" class="small">远程桌面</text>

  <path d="M245 225 C278 225 278 182 310 182" class="arrow"/>
  <path d="M245 299 C278 299 278 338 310 338" class="arrow"/>
  <path d="M555 182 C590 182 590 229 629 229" class="arrow"/>
  <path d="M555 338 C590 338 590 291 629 291" class="arrow"/>
  <path d="M931 260 H1000" class="arrow"/>
  <rect x="946" y="228" width="64" height="22" rx="11" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="978" y="243" text-anchor="middle" class="small">HKU VPN</text>

  <rect x="40" y="453" width="1120" height="54" rx="6" fill="#f1f5f9"/>
  <text x="600" y="476" text-anchor="middle" class="body">项目范围之外：直连、AI / 外部代理、其他 VPN，以及所有非 HKU 分流规则</text>
  <text x="600" y="496" text-anchor="middle" class="small">这些策略继续由应用或分流客户端管理；Docker-VPN 只增加上方的 HKU 上游</text>
</svg>
