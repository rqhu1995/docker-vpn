<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Docker-VPN 选择性分流架构</title>
  <desc id="desc">应用流量先经过分流规则。非 HKU 流量可以完全不经 VPN 直连，也可以继续遵循 Surge 或 Clash 的现有代理策略；只有选中的 HKU 流量进入本项目的 OpenConnect 隧道。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <clipPath id="rounded-icon" clipPathUnits="objectBoundingBox">
      <rect width="1" height="1" rx="0.18"/>
    </clipPath>
    <style>
      .title { font: 700 28px -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Segoe UI', sans-serif; fill: #0f172a; }
      .subtitle { font: 400 16px -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Segoe UI', sans-serif; fill: #475569; }
      .heading { font: 700 18px -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Segoe UI', sans-serif; fill: #0f172a; }
      .body { font: 500 14px -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Segoe UI', sans-serif; fill: #334155; }
      .small { font: 500 12px -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Segoe UI', sans-serif; fill: #64748b; }
      .mono { font: 600 13px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #0f172a; }
      .arrow { fill: none; stroke: #334155; stroke-width: 2.5; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="1" y="1" width="1198" height="558" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="40" y="48" class="title">选择性分流，一图看懂</text>
  <text x="40" y="76" class="subtitle">一台电脑，三种明确的流量去向</text>

  <rect x="40" y="150" width="210" height="260" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="145" y="187" text-anchor="middle" class="heading">应用与工具</text>
  <circle cx="76" cy="245" r="25" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5"/>
  <circle cx="76" cy="245" r="13" fill="none" stroke="#0284c7" stroke-width="2"/>
  <path d="M63 245 H89 M76 232 C70 239 70 251 76 258 M76 232 C82 239 82 251 76 258" fill="none" stroke="#0284c7" stroke-width="1.5"/>
  <rect x="119" y="220" width="50" height="50" rx="9" fill="#111827"/>
  <text x="144" y="252" text-anchor="middle" style="font: 700 16px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #ffffff;">&gt;_</text>
  <image href="brands/windows-app.png" x="184" y="220" width="50" height="50" clip-path="url(#rounded-icon)"/>
  <text x="76" y="296" text-anchor="middle" class="small">浏览器</text>
  <text x="144" y="296" text-anchor="middle" class="small">SSH</text>
  <text x="209" y="296" text-anchor="middle" class="small">远程桌面</text>
  <rect x="63" y="322" width="164" height="58" rx="6" fill="#ffffff"/>
  <text x="145" y="347" text-anchor="middle" class="body">按目标选择路径</text>
  <text x="145" y="369" text-anchor="middle" class="small">无需切换系统级 VPN</text>

  <rect x="300" y="150" width="220" height="260" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <circle cx="334" cy="188" r="15" fill="#2563eb"/>
  <path d="M327 188 L332 193 L342 181" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="360" y="194" class="heading">分流规则</text>
  <rect x="324" y="220" width="172" height="48" rx="5" fill="#ffffff"/>
  <text x="338" y="240" class="body">HKU 域名</text>
  <text x="338" y="258" class="small">与精确校园网段</text>
  <rect x="324" y="282" width="172" height="48" rx="5" fill="#ffffff"/>
  <text x="338" y="302" class="body">其余流量</text>
  <text x="338" y="320" class="small">保持现有规则</text>
  <text x="410" y="374" text-anchor="middle" class="small">Surge · Clash · 应用设置</text>

  <rect x="610" y="102" width="260" height="178" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="630" y="132" class="heading">非 HKU 路径</text>
  <rect x="626" y="143" width="228" height="48" rx="6" fill="#ffffff"/>
  <circle cx="650" cy="167" r="15" fill="#e0f2fe" stroke="#0284c7"/>
  <path d="M638 167 H662 M650 155 C644 161 644 173 650 179 M650 155 C656 161 656 173 650 179" fill="none" stroke="#0284c7" stroke-width="1.5"/>
  <text x="676" y="163" class="body">互联网直连</text>
  <text x="676" y="182" class="small">完全不经过 VPN</text>
  <rect x="626" y="199" width="228" height="66" rx="6" fill="#ffffff"/>
  <image href="brands/surge.png" x="638" y="211" width="42" height="42" clip-path="url(#rounded-icon)"/>
  <image href="brands/clash-verge-rev.png" x="690" y="211" width="42" height="42" clip-path="url(#rounded-icon)"/>
  <text x="743" y="225" class="body">现有代理 / VPN</text>
  <text x="743" y="247" class="small">Surge · Clash · :6152</text>

  <rect x="600" y="305" width="280" height="190" rx="12" fill="#d1fae5" opacity="0.7"/>
  <rect x="610" y="315" width="260" height="170" rx="8" fill="#ecfdf5" stroke="#047857" stroke-width="4"/>
  <image href="docker-vpn-icon.png" x="630" y="347" width="66" height="66" clip-path="url(#rounded-icon)"/>
  <rect x="714" y="329" width="120" height="22" rx="11" fill="#047857"/>
  <text x="774" y="344" text-anchor="middle" style="font: 700 11px -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Segoe UI', sans-serif; fill: #ffffff;">本项目</text>
  <text x="714" y="383" class="heading" style="font-size: 22px;">Docker-VPN</text>
  <text x="634" y="427" class="body">仅负责 HKU 的 OpenConnect 隧道</text>
  <text x="634" y="453" class="mono">SOCKS5 :1080</text>
  <text x="758" y="453" class="mono">HTTP :1088</text>
  <text x="634" y="477" class="small">主机默认路由保持不变</text>

  <rect x="950" y="102" width="210" height="178" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/>
  <image href="brands/claude.jpg" x="970" y="120" width="46" height="46" clip-path="url(#rounded-icon)"/>
  <image href="brands/chatgpt.png" x="1032" y="120" width="46" height="46" clip-path="url(#rounded-icon)"/>
  <image href="brands/codex.png" x="1094" y="120" width="46" height="46" clip-path="url(#rounded-icon)"/>
  <text x="993" y="192" text-anchor="middle" class="small">Claude</text>
  <text x="1055" y="192" text-anchor="middle" class="small">ChatGPT</text>
  <text x="1117" y="192" text-anchor="middle" class="small">Codex</text>
  <text x="1055" y="226" text-anchor="middle" class="heading">AI 与外部服务</text>
  <text x="1055" y="248" text-anchor="middle" class="small">网页 · 下载 · Coding Agent</text>

  <rect x="950" y="315" width="210" height="170" rx="8" fill="#fff1f2" stroke="#e11d48" stroke-width="2"/>
  <image href="brands/hku-shield.png" x="970" y="332" width="74" height="74" clip-path="url(#rounded-icon)"/>
  <rect x="1063" y="347" width="76" height="46" rx="7" fill="#111827"/>
  <text x="1101" y="376" text-anchor="middle" style="font: 700 14px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #ffffff;">&gt;_ SSH</text>
  <text x="1055" y="433" text-anchor="middle" class="heading">HKU 资源</text>
  <text x="1055" y="458" text-anchor="middle" class="small">图书馆 · SSH · 远程桌面</text>

  <path d="M250 280 H300" class="arrow"/>
  <path d="M520 245 C560 245 565 191 610 191" class="arrow"/>
  <path d="M520 316 C560 316 565 400 610 400" class="arrow"/>
  <path d="M870 191 H950" class="arrow"/>
  <path d="M870 400 H950" class="arrow"/>
  <rect x="535" y="158" width="72" height="24" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="571" y="174" text-anchor="middle" class="small">非 HKU</text>
  <rect x="535" y="359" width="72" height="24" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="571" y="375" text-anchor="middle" class="small">仅 HKU</text>

  <rect x="40" y="512" width="1120" height="28" rx="6" fill="#f1f5f9"/>
  <text x="600" y="531" text-anchor="middle" class="body">Docker-VPN 只处理选中的 HKU 流量 · 直连与现有代理路径保持独立</text>
</svg>
