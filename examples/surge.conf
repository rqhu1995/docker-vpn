# Merge these entries into an existing Surge profile. Do not replace the whole
# profile with this fragment.

[Proxy]
HKU-SOCKS5 = socks5, 127.0.0.1, 1080
HKU-HTTP = http, 127.0.0.1, 1088

[Proxy Group]
# Replace EXISTING-PROXY with the group that already handles normal external
# traffic on your device.
HKU = select, HKU-SOCKS5, HKU-HTTP, EXISTING-PROXY, DIRECT
HKU-CONTROL = select, DIRECT, EXISTING-PROXY

[Rule]
# The VPN control connection must not enter its own not-yet-established tunnel.
# Select DIRECT or EXISTING-PROXY in HKU-CONTROL based on endpoint reachability.
DOMAIN,vpn2fa.hku.hk,HKU-CONTROL
# This is the real mainland endpoint currently selected by `hkuvpn cn`, not a
# placeholder. Keep it aligned with bin/hkuvpn when the endpoint changes.
IP-CIDR,121.37.195.197/32,HKU-CONTROL,no-resolve

# Add only the campus subnets and services you actually use. Do not send all of
# RFC1918 through HKU because that can break home and office LAN access.
# 192.0.2.0/24 is TEST-NET-1 documentation space; replace it before enabling.
# IP-CIDR,192.0.2.0/24,HKU,no-resolve
DOMAIN-SUFFIX,hku.hk,HKU
DOMAIN-SUFFIX,hku.edu.hk,HKU

# Keep AI and general Internet rules below the HKU-specific rules and point them
# at your existing proxy group, not at HKU-SOCKS5/HKU-HTTP.
# DOMAIN-SUFFIX,openai.com,EXISTING-PROXY
# DOMAIN-SUFFIX,anthropic.com,EXISTING-PROXY
